name: Java CI/CD Pipeline to Tomcat

on:
push:
branches:
- main

jobs:
build:
runs-on:
- self-hosted
- linux

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  - name: Ensure Maven is installed
    shell: bash
    run: |
      if ! command -v mvn >/dev/null 2>&1; then
        echo "Installing Maven..."
        sudo dnf install -y maven
      fi
      mvn -version

  - name: Cache Maven dependencies
    uses: actions/cache@v4
    with:
      path: ~/.m2/repository
      key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
      restore-keys: |
        ${{ runner.os }}-maven-

  - name: Build with Maven
    run: mvn clean package -DskipTests

  - name: Upload WAR artifact
    uses: actions/upload-artifact@v4
    with:
      name: myapp
      path: target/*.war

  - name: Install SonarQube Scanner
    shell: bash
    run: |
      if [ ! -d "$HOME/sonar-scanner-cli" ]; then
        wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.3.0.5189-linux-x64.zip -O /tmp/sonar-scanner.zip
        unzip -o /tmp/sonar-scanner.zip -d $HOME
        mv $HOME/sonar-scanner-7.3.0.5189-linux-x64 $HOME/sonar-scanner-cli
      fi

      echo "$HOME/sonar-scanner-cli/bin" >> $GITHUB_PATH

  - name: SonarQube Analysis
    env:
      SONAR_HOST: ${{ secrets.SONAR_HOST }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    shell: bash
    run: |
      echo "Checking SonarQube connectivity..."
      curl -I "$SONAR_HOST"

      mvn sonar:sonar \
        -Dsonar.projectKey=hotstar \
        -Dsonar.host.url="$SONAR_HOST" \
        -Dsonar.login="$SONAR_TOKEN"
```

deploy:
needs: build
runs-on:
- self-hosted
- linux
environment: production

```
steps:
  - name: Download WAR artifact
    uses: actions/download-artifact@v4
    with:
      name: myapp

  - name: Deploy to Tomcat
    shell: bash
    run: |
      WAR_FILE=$(ls *.war | head -1)

      echo "Deploying $WAR_FILE to Tomcat..."

      curl --upload-file "$WAR_FILE" \
      "http://${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }}@${{ secrets.TOMCAT_HOST }}/manager/text/deploy?path=/myapp&update=true"

  - name: Verify deployment
    shell: bash
    run: |
      curl -I "http://${{ secrets.TOMCAT_HOST }}/myapp"
```
